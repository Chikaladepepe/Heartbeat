<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heartbeat</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        body { 
            background: linear-gradient(180deg, #2d1b4e 0%, #7a4d7b 50%, #d63384 100%); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; font-family: 'Georgia', serif; overflow: hidden; 
        }

        /* Stars Background */
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--duration) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        /* Loading Screen */
        #loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; transition: opacity 1s ease; 
        }
        .loader-text { color: white; font-size: 16px; letter-spacing: 3px; font-style: italic; margin-bottom: 20px; }
        
        /* Progress Bar */
        #progress-container { width: 200px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: white; transition: width 8s linear; }

        /* Main UI */
        #heart-btn { width: 160px; cursor: pointer; transition: transform 0.3s, opacity 0.5s; animation: beat 1.5s infinite; z-index: 10; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)); display: none; opacity: 0; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* The Paper Scroll */
        #letter-container { 
            display: none; position: fixed; width: 80%; max-width: 350px; background: #fdfbf7; 
            padding: 40px 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); border-radius: 4px;
            transform: scaleY(0); transform-origin: top; transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            z-index: 20; text-align: center; color: #444; border: 1px solid #eee;
        }
        #letter-container.open { display: block; transform: scaleY(1); }
        .paper-texture { font-size: 20px; line-height: 1.6; font-style: italic; white-space: pre-wrap; word-wrap: break-word; }
        .close-btn { margin-top: 30px; font-size: 11px; color: #bbb; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <!-- Stars Generator Container -->
    <div id="stars"></div>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="loader-text">SYNCHRONIZING...</div>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <img src="icon.png" id="heart-btn" alt="Heart">

    <div id="letter-container">
        <div class="paper-texture" id="letter-text">Reading my heart...</div>
        <div class="close-btn" onclick="closeLetter()">Close Letter</div>
    </div>

    <script>
        // Generate Stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.width = star.style.height = Math.random() * 3 + 'px';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            starsContainer.appendChild(star);
        }

        const loader = document.getElementById('loader');
        const bar = document.getElementById('progress-bar');
        const btn = document.getElementById('heart-btn');
        const container = document.getElementById('letter-container');
        const text = document.getElementById('letter-text');

        window.onload = () => {
            // Start progress bar
            setTimeout(() => { bar.style.width = '100%'; }, 100);

            // Hide loader after 8s
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    btn.style.display = 'block';
                    setTimeout(() => btn.style.opacity = '1', 50);
                }, 1000);
            }, 8000); 
        };

        btn.onclick = async () => {
            btn.style.opacity = '0';
            setTimeout(() => btn.style.display = 'none', 300);
            container.style.display = 'block';
            setTimeout(() => container.classList.add('open'), 50);

            try {
                const res = await fetch('/api/get-letter');
                const data = await res.json();
                text.innerText = data.letter;
            } catch (err) {
                text.innerText = "I lost my words... try tapping again?";
            }
        };

        function closeLetter() {
            container.classList.remove('open');
            setTimeout(() => {
                container.style.display = 'none';
                btn.style.display = 'block';
                setTimeout(() => btn.style.opacity = '1', 50);
            }, 600);
        }
    </script>
</body>
</html>
