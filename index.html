<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heartbeat</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        body { background: #fff5f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Georgia', serif; overflow: hidden; }

        /* Loading Screen */
        #loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff5f5; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; transition: opacity 1s ease; 
        }
        .loader-text { color: #d63384; font-size: 18px; letter-spacing: 2px; animation: pulse 2s infinite; font-style: italic; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* Main UI */
        #heart-btn { width: 160px; cursor: pointer; transition: transform 0.3s, opacity 0.5s; animation: beat 1.5s infinite; z-index: 10; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); visibility: hidden; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        #letter-container { 
            display: none; position: fixed; width: 80%; max-width: 350px; background: #fdfbf7; 
            padding: 40px 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border-radius: 2px;
            transform: scaleY(0); transform-origin: top; transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            z-index: 20; text-align: center; color: #444; border: 1px solid #eee;
        }
        #letter-container.open { display: block; transform: scaleY(1); }
        .paper-texture { font-size: 20px; line-height: 1.6; font-style: italic; white-space: pre-wrap; word-wrap: break-word; }
        .close-btn { margin-top: 30px; font-size: 12px; color: #bbb; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="loader-text">Synchronizing heartbeats...</div>
    </div>

    <img src="icon.png" id="heart-btn" alt="Heart">

    <div id="letter-container">
        <div class="paper-texture" id="letter-text">Reading my heart...</div>
        <div class="close-btn" onclick="closeLetter()">Close Letter</div>
    </div>

    <script>
        const loader = document.getElementById('loader');
        const btn = document.getElementById('heart-btn');
        const container = document.getElementById('letter-container');
        const text = document.getElementById('letter-text');

        // Loading Logic (8 Seconds)
        window.onload = () => {
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    btn.style.visibility = 'visible';
                }, 1000);
            }, 8000); 
        };

        btn.onclick = async () => {
            btn.style.opacity = '0';
            setTimeout(() => btn.style.display = 'none', 300);
            container.style.display = 'block';
            setTimeout(() => container.classList.add('open'), 50);

            try {
                const res = await fetch('/api/get-letter');
                const data = await res.json();
                text.innerText = data.letter;
            } catch (err) {
                text.innerText = "I lost my words... try tapping again?";
            }
        };

        function closeLetter() {
            container.classList.remove('open');
            setTimeout(() => {
                container.style.display = 'none';
                btn.style.display = 'block';
                btn.style.opacity = '1';
            }, 600);
        }
    </script>
</body>
</html>
